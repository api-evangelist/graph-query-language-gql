aid: graph-query-language-gql
name: Graph Query Language (GQL)
description: An international standard query language for property graph databases,
  developed by ISO/IEC to provide a declarative way to query and manipulate graph
  data structures. Effective implementation supports data-driven strategies and helps
  maintain data integrity across systems.
